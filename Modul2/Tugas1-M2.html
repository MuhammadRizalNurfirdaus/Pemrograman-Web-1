<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Pemesanan</title>
  </head>
  <body>
    <h1>Form Pemesanan</h1>
    <form>
      <label for="id_pemesanan">Id Pemesan:</label>
      <input
        type="text"
        id="id_pemesanan"
        name="id_pemesanan"
        value="1"
        readonly
      /><br /><br />

      <label for="nama_pemesan">Nama Pemesan:</label>
      <input type="text" id="nama_pemesan" name="nama_pemesan" /><br /><br />

      <label for="nomor_identitas">Nomor Identitas:</label>
      <input
        type="text"
        id="nomor_identitas"
        name="nomor_identitas"
      /><br /><br />

      <label for="tipe_kamar">Tipe Kamar:</label>
      <select id="tipe_kamar" name="tipe_kamar">
        <option value="">--Pilih--</option>
        <option value="standar">STANDAR</option>
        <option value="deluxe">DELUXE</option>
        <option value="family">FAMILY</option></select
      ><br /><br />

      <label for="harga">Harga:</label>
      <input type="text" id="harga" name="harga" /><br /><br />

      <label for="tanggal_pesan">Tanggal Pesan:</label>
      <input type="date" id="tanggal_pesan" name="tanggal_pesan" /><br /><br />

      <label for="durasi">Durasi Menginap:</label>
      <input type="number" id="durasi" name="durasi" min="1" /> Hari<br /><br />

      <label for="breakfast">Termasuk Breakfast:</label>
      <input type="checkbox" id="breakfast" name="breakfast" /><br /><br />

      <label for="total_bayar">Total Bayar:</label>
      <input
        type="text"
        id="total_bayar"
        name="total_bayar"
        readonly
      /><br /><br />

      <button type="submit" style="background-color: blue; color: white">
        Simpan
      </button>
      <button type="reset" style="background-color: yellow; color: black">
        Batal
      </button>
    </form>
  </body>
</html>
